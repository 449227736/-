<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>套管交付与质量专项改善 — 问题异常跟踪表</title>
<style>
/* ====== RESET & BASE ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;
  --surface:#fff;
  --primary:#4f6ef7;
  --primary-hover:#3b5de7;
  --primary-light:#eef1ff;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --border:#e2e8f0;
  --border2:#f1f5f9;
  --radius:8px;
  --radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --transition:all .2s ease;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* ====== HEADER ====== */
.app-header{
  background:linear-gradient(135deg,#1e293b 0%,#334155 100%);
  color:#fff;padding:0 32px;display:flex;align-items:center;
  justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.12);
}
.app-header .logo{display:flex;align-items:center;gap:12px}
.app-header .logo svg{width:32px;height:32px}
.app-header h1{font-size:17px;font-weight:600;letter-spacing:.3px}
.header-actions{display:flex;gap:8px}
.header-actions .hbtn{
  padding:7px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  cursor:pointer;border:none;transition:var(--transition);font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;
}
.hbtn-primary{background:var(--primary);color:#fff}
.hbtn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,110,247,.35)}
.hbtn-outline{background:transparent;color:#cbd5e1;border:1px solid #475569}
.hbtn-outline:hover{color:#fff;border-color:#94a3b8}

/* ====== STATS CARDS ====== */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;margin-bottom:20px;
}
.stat-card{
  background:var(--surface);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px;transition:var(--transition);
}
.stat-card{cursor:pointer;transition:all .2s}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-icon{width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:22px}
.stat-icon.blue{background:#eef1ff;color:var(--primary)}
.stat-icon.green{background:#ecfdf5;color:var(--success)}
.stat-icon.amber{background:#fffbeb;color:var(--warning)}
.stat-icon.red{background:#fef2f2;color:var(--danger)}
.stat-icon.gray{background:#f8fafc;color:var(--text2)}
.stat-info .stat-num{font-size:26px;font-weight:700;color:var(--text);line-height:1.2}
.stat-info .stat-label{font-size:12px;color:var(--text2);margin-top:2px}

/* ====== MAIN CONTAINER ====== */
.app-container{max-width:1540px;margin:0 auto;padding:20px 24px}

/* ====== PAGE SECTION ====== */
.page-section{display:none}
.page-section.active{display:block}

/* ====== TOOLBAR ====== */
.toolbar{
  background:var(--surface);border-radius:var(--radius);padding:16px 20px;
  box-shadow:var(--shadow);margin-bottom:16px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.toolbar input,.toolbar select{
  padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;outline:none;transition:var(--transition);font-family:inherit;
  background:var(--bg);color:var(--text);
}
.toolbar input:focus,.toolbar select:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.1);
  background:#fff;
}
.toolbar input{width:180px}
.toolbar select{min-width:120px}
.toolbar .spacer{flex:1}

/* ====== BUTTONS ====== */
.btn{
  display:inline-flex;align-items:center;gap:4px;padding:7px 16px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  cursor:pointer;border:1px solid transparent;transition:var(--transition);
  font-family:inherit;white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#16a34a}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#d97706}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg);color:var(--text);border-color:var(--text3)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 7px;font-size:11px}

/* ====== DATA TABLE ====== */
.table-wrap{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.table-wrap .table-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border2);
}
.table-wrap .table-header h3{font-size:15px;font-weight:600;color:var(--text)}
.table-wrap .table-header .count{font-size:12px;color:var(--text2);font-weight:400}

.table-scroll{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:1380px}
.data-table thead{position:sticky;top:0;z-index:2}
.data-table thead th{
  background:#f8fafc;font-weight:600;text-align:center;
  padding:10px 8px;border-bottom:2px solid var(--border);
  white-space:nowrap;color:var(--text2);font-size:12px;
  text-transform:uppercase;letter-spacing:.3px;
}
.data-table tbody td{
  padding:10px 8px;border-bottom:1px solid var(--border2);
  text-align:center;vertical-align:middle;
}
.data-table tbody tr{transition:var(--transition)}
.data-table tbody tr:hover{background:#f8fafc}
.data-table tbody tr:nth-child(even){background:#fcfcfd}
.data-table tbody tr:nth-child(even):hover{background:#f8fafc}

.cell-text{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;display:inline-block}
.cell-actions{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}

/* Status badges */
.status{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.3px;
}
.status-未开始{background:#fef3c7;color:#92400e}
.status-处理中{background:#dbeafe;color:#1e40af}
.status-已完成{background:#d1fae5;color:#065f46}
.status-已关闭{background:#f1f5f9;color:#475569}
.status-延期{background:#fee2e2;color:#991b1b}

/* Image thumb in table */
.img-thumb-wrap{display:inline-flex;align-items:center;gap:2px}
.img-thumb{
  width:36px;height:27px;object-fit:cover;border-radius:3px;
  border:1px solid var(--border);cursor:pointer;transition:var(--transition);
}
.img-thumb:hover{transform:scale(2.5);z-index:10;position:relative;box-shadow:var(--shadow-md)}
.img-thumb-placeholder{
  width:36px;height:27px;border-radius:3px;border:1px dashed var(--border);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--text3);cursor:pointer;
}
.img-count{font-size:10px;color:var(--text3);margin-left:1px}

/* ====== PAGINATION ====== */
.pagination{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:16px 20px;border-top:1px solid var(--border2);
}
.pagination button{
  min-width:32px;height:32px;border:1px solid var(--border);
  background:var(--surface);border-radius:var(--radius-sm);
  cursor:pointer;font-size:12px;font-family:inherit;transition:var(--transition);
  display:flex;align-items:center;justify-content:center;
}
.pagination button:hover:not(:disabled):not(.active){border-color:var(--primary);color:var(--primary)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination .page-jump{font-size:12px;color:var(--text2);margin-left:8px}

/* ====== EMPTY STATE ====== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty-state p{font-size:14px}

/* ====== FORM SECTION ====== */
.form-section{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:28px;max-width:1000px;
}
.form-section h3{
  font-size:17px;font-weight:600;margin-bottom:24px;padding-bottom:12px;
  border-bottom:2px solid var(--primary-light);color:var(--text);
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px}
.form-grid .full-width{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-weight:500;font-size:12px;color:var(--text2);letter-spacing:.2px}
.form-group label .req{color:var(--danger)}
.form-group input,.form-group select,.form-group textarea{
  padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;font-family:inherit;outline:none;transition:var(--transition);
  background:var(--bg);color:var(--text);
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.1);background:#fff;
}
.form-group textarea{resize:vertical;min-height:70px}
.form-actions{
  display:flex;gap:10px;margin-top:24px;padding-top:18px;
  border-top:1px solid var(--border2);
}

/* Image upload */
.img-upload-area{
  border:2px dashed var(--border);border-radius:var(--radius-sm);
  padding:20px;text-align:center;cursor:pointer;transition:var(--transition);
  background:var(--bg);
}
.img-upload-area:hover{border-color:var(--primary);background:var(--primary-light)}
.img-upload-area .up-icon{font-size:28px;color:var(--text3)}
.img-upload-area .up-text{font-size:12px;color:var(--text3);margin-top:4px}
.img-preview-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.img-preview-item{
  position:relative;width:96px;height:72px;border:1px solid var(--border);
  border-radius:var(--radius-sm);overflow:hidden;
}
.img-preview-item img{width:100%;height:100%;object-fit:cover}
.img-preview-item .img-del{
  position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;
  background:rgba(239,68,68,.85);color:#fff;border:none;cursor:pointer;
  font-size:11px;display:none;align-items:center;justify-content:center;
}
.img-preview-item:hover .img-del{display:flex}

/* ====== DETAIL PAGE ====== */
.detail-section{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:28px;max-width:900px;
}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.detail-header h3{font-size:17px;font-weight:600;color:var(--text)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-grid .full-width{grid-column:1/-1}
.detail-item{
  padding:10px 0;border-bottom:1px solid var(--border2);display:flex;gap:10px;
}
.detail-item .dl{font-weight:500;color:var(--text2);min-width:110px;font-size:12px;flex-shrink:0}
.detail-item .dv{color:var(--text);flex:1;font-size:13px;word-break:break-all}
.detail-images{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.detail-images img{
  max-width:260px;max-height:200px;object-fit:contain;
  border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;
  transition:var(--transition);
}
.detail-images img:hover{transform:scale(1.02);box-shadow:var(--shadow-md)}

/* ====== MODAL ====== */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  backdrop-filter:blur(2px);z-index:1000;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal-box{
  background:var(--surface);border-radius:var(--radius);padding:28px;
  min-width:380px;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.modal-box h4{font-size:16px;margin-bottom:8px;color:var(--text)}
.modal-box p{color:var(--text2);margin-bottom:20px;line-height:1.6;font-size:14px}
.modal-box .modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* Toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 20px;border-radius:var(--radius-sm);color:#fff;font-size:13px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);animation:toastIn .3s ease;max-width:360px;
  font-weight:500;
}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
.toast-warn{background:var(--warning)}
.toast-info{background:var(--primary)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* Export progress */
.export-bar{display:none;text-align:center;padding:12px;background:var(--primary-light);border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px;color:var(--primary);font-weight:500}
.export-bar.show{display:block}

@media(max-width:900px){
  .form-grid,.detail-grid{grid-template-columns:1fr}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar input,.toolbar select{width:100%}
  .app-header{flex-direction:column;height:auto;padding:12px 16px;gap:10px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}

/* ====== DROPDOWN EXPORT BUTTON ====== */
.dropdown-wrap{position:relative;display:inline-flex}
.dropdown-menu{
  display:none;position:absolute;top:calc(100% + 4px);right:0;z-index:200;
  background:#1e293b;border:1px solid #475569;border-radius:var(--radius-sm);
  min-width:210px;box-shadow:0 8px 24px rgba(0,0,0,.3);overflow:hidden;
}
.dropdown-wrap.open .dropdown-menu{display:block}
.dropdown-item{
  display:block;width:100%;padding:10px 16px;
  text-align:left;background:transparent;border:none;
  color:#cbd5e1;font-size:13px;font-family:inherit;cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
.dropdown-item:hover{background:#334155;color:#fff}
.dropdown-item .item-sub{font-size:11px;color:#64748b;margin-top:2px}
.dropdown-item:hover .item-sub{color:#94a3b8}
.dropdown-item+.dropdown-item{border-top:1px solid #334155}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <svg viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#4f6ef7"/><text x="16" y="22" text-anchor="middle" fill="white" font-size="18" font-weight="bold">T</text></svg>
    <h1>套管交付与质量专项改善 — 问题异常跟踪表</h1>
  </div>
  <div class="header-actions">
    <button class="hbtn hbtn-primary" onclick="switchPage('add')">+ 新增记录</button>
    <button class="hbtn hbtn-outline" onclick="pushToGitHub()" id="btn-push-github" title="将当前数据上传到 GitHub 仓库">上传到 GitHub</button>
    <div class="dropdown-wrap" id="export-dropdown">
      <button class="hbtn hbtn-outline" onclick="toggleExportDropdown(event)">导出 Excel ▾</button>
      <div class="dropdown-menu">
        <button class="dropdown-item" onclick="exportNormal()">
          正常数据导出
          <div class="item-sub">导出当前问题跟踪明细表</div>
        </button>
        <button class="dropdown-item" onclick="exportAnalysis()">
          数据分析导出（复盘资料）
          <div class="item-sub">生成多 Sheet 复盘分析资料</div>
        </button>
      </div>
    </div>
    <button class="hbtn hbtn-outline" onclick="exportJSON()">导出 JSON</button>
    <button class="hbtn hbtn-outline" onclick="document.getElementById('import-file').click()">导入 JSON</button>
    <button class="hbtn hbtn-outline" onclick="restoreBackup()" id="btn-restore">重置为初始数据</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</header>

<div class="app-container">

  <!-- ====== LIST VIEW ====== -->
  <div class="page-section active" id="page-list">

    <!-- Stats Cards -->
    <div class="stats-row">
      <div class="stat-card" onclick="statFilter('')" title="点击查看全部记录">
        <div class="stat-icon blue">&#128203;</div>
        <div class="stat-info"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总记录数</div></div>
      </div>
      <div class="stat-card" onclick="statFilter('已完成')" title="点击查看已完成的记录">
        <div class="stat-icon green">&#9989;</div>
        <div class="stat-info"><div class="stat-num" id="stat-done">0</div><div class="stat-label">已完成</div></div>
      </div>
      <div class="stat-card" onclick="statFilter('处理中')" title="点击查看处理中的记录">
        <div class="stat-icon amber">&#9881;</div>
        <div class="stat-info"><div class="stat-num" id="stat-progress">0</div><div class="stat-label">处理中</div></div>
      </div>
      <div class="stat-card" onclick="statFilter('未开始')" title="点击查看待处理的记录">
        <div class="stat-icon red">&#9888;</div>
        <div class="stat-info"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">待处理</div></div>
      </div>
      <div class="stat-card" onclick="statFilter('延期')" title="点击查看延期的记录">
        <div class="stat-icon gray">&#128337;</div>
        <div class="stat-info"><div class="stat-num" id="stat-delay">0</div><div class="stat-label">延期</div></div>
      </div>
    </div>

    <!-- Filter Toolbar -->
    <div class="toolbar">
      <input type="text" id="f-keyword" placeholder="&#128269; 搜索关键词..." oninput="applyFilters()">
      <select id="f-type" onchange="applyFilters()">
        <option value="">全部类型</option>
        <option value="工艺">工艺</option><option value="物料">物料</option>
        <option value="夹具/工装">夹具/工装</option><option value="设备">设备</option>
        <option value="人员">人员</option><option value="模具">模具</option><option value="其他">其他</option>
      </select>
      <select id="f-status" onchange="applyFilters()">
        <option value="">全部状态</option>
        <option value="未开始">未开始</option><option value="处理中">处理中</option>
        <option value="已完成">已完成</option><option value="已关闭">已关闭</option><option value="延期">延期</option>
      </select>
      <input type="text" id="f-person" placeholder="责任人..." oninput="applyFilters()">
      <select id="f-date-field" onchange="applyFilters()" style="min-width:110px">
        <option value="">日期不限</option>
        <option value="plannedDate">计划完成时间</option>
        <option value="actualDate">实际完成时间</option>
        <option value="createdAt">创建时间</option>
      </select>
      <input type="date" id="f-date-pick" onchange="onDatePick()" title="选择具体日期" style="width:135px">
      <span class="spacer"></span>
      <span style="font-size:12px;color:var(--text3)" id="filter-count"></span>
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()">清空</button>
    </div>

    <div class="export-bar" id="export-bar">正在生成 Excel 文件，请稍候...</div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <h3>数据列表 <span class="count" id="table-count"></span></h3>
        <button class="btn btn-primary btn-sm" onclick="exportNormal()">导出 Excel</button>
      </div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th style="width:48px">#</th>
            <th style="width:80px">提出人</th>
            <th style="width:180px">异常问题描述</th>
            <th style="width:80px">问题类型</th>
            <th style="width:70px">图片</th>
            <th style="width:160px">解决措施</th>
            <th style="width:70px">交付物</th>
            <th style="width:80px">责任人</th>
            <th style="width:80px">协助人</th>
            <th style="width:100px">计划完成</th>
            <th style="width:80px">状态</th>
            <th style="width:100px">实际完成</th>
            <th style="width:80px">备注</th>
            <th style="width:100px">操作</th>
          </tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">&#128203;</div>
        <p>暂无数据，点击右上角「新增记录」开始</p>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- ====== ADD / EDIT ====== -->
  <div class="page-section" id="page-add">
    <div class="form-section">
      <h3 id="form-title">新增记录</h3>
      <form id="record-form" onsubmit="return false">
        <input type="hidden" id="edit-id">
        <div class="form-grid">
          <div class="form-group"><label>问题提出人 <span class="req">*</span></label><input type="text" id="fld-reporter" placeholder="请输入" required></div>
          <div class="form-group"><label>问题类型 <span class="req">*</span></label>
            <select id="fld-type" required><option value="">请选择</option><option value="工艺">工艺</option><option value="物料">物料</option><option value="夹具/工装">夹具/工装</option><option value="设备">设备</option><option value="人员">人员</option><option value="模具">模具</option><option value="其他">其他</option></select></div>
          <div class="form-group"><label>责任人 <span class="req">*</span></label><input type="text" id="fld-responsible" placeholder="请输入" required></div>
          <div class="form-group"><label>协助人</label><input type="text" id="fld-assistant" placeholder="请输入"></div>
          <div class="form-group"><label>计划完成时间</label><input type="date" id="fld-planned-date"></div>
          <div class="form-group"><label>完成情况</label>
            <select id="fld-status"><option value="未开始">未开始</option><option value="处理中">处理中</option><option value="已完成">已完成</option><option value="已关闭">已关闭</option><option value="延期">延期</option></select></div>
          <div class="form-group"><label>实际完成时间</label><input type="date" id="fld-actual-date"></div>
          <div class="form-group"><label>交付物</label><input type="text" id="fld-deliverable" placeholder="如：图纸、报告、实物..."></div>
          <div class="form-group full-width"><label>异常问题描述 <span class="req">*</span></label><textarea id="fld-desc" rows="2" placeholder="请详细描述异常问题..." required></textarea></div>
          <div class="form-group full-width"><label>解决措施</label><textarea id="fld-solution" rows="2" placeholder="解决措施..."></textarea></div>
          <div class="form-group full-width"><label>备注</label><textarea id="fld-remarks" rows="2" placeholder="其他备注信息..."></textarea></div>
          <div class="form-group full-width">
            <label>图片 / 视频</label>
            <div class="img-upload-area" onclick="document.getElementById('img-input').click()">
              <div class="up-icon">&#128247;</div>
              <div class="up-text">点击上传图片（jpg / png / webp，单张 ≤ 5MB）</div>
            </div>
            <input type="file" id="img-input" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="handleImageUpload(this)">
            <div class="img-preview-list" id="img-preview-list"></div>
          </div>
          <div class="form-group full-width">
            <label>交付物图片</label>
            <div class="img-upload-area" onclick="document.getElementById('deliverable-img-input').click()">
              <div class="up-icon">&#128206;</div>
              <div class="up-text">点击上传交付物图片（jpg / png / webp，单张 ≤ 5MB）</div>
            </div>
            <input type="file" id="deliverable-img-input" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="handleDeliverableImageUpload(this)">
            <div class="img-preview-list" id="deliverable-img-preview-list"></div>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="switchPage('list')">&#8592; 返回</button>
          <span class="spacer"></span>
          <button type="button" class="btn btn-primary" onclick="submitForm()" style="padding:10px 28px">保存记录</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====== DETAIL ====== -->
  <div class="page-section" id="page-detail">
    <div class="detail-section">
      <div class="detail-header">
        <h3>记录详情</h3>
        <button class="btn btn-ghost btn-sm" onclick="switchPage('list')">&#8592; 返回列表</button>
      </div>
      <div class="detail-grid" id="detail-content"></div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <h4>&#9888; 确认删除</h4>
    <p id="delete-msg">确定删除该记录吗？删除后不可恢复。</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('delete-modal')">取消</button>
      <button class="btn btn-danger" id="delete-confirm-btn">确认删除</button>
    </div>
  </div>
</div>

/* Load / Save */
function loadRecords(){ loadLocalFallback(); }
function loadLocalFallback(){
  // 每次刷新都清除旧缓存，直接从云端 backup.json 加载最新数据
  localStorage.removeItem(STORAGE_KEY);
  records=[];
  fetch('./backup.json?_t='+Date.now()).then(function(resp){
    if(!resp.ok)throw new Error('skip');
    return resp.json();
  }).then(function(data){
    if(!Array.isArray(data)||data.length===0)throw new Error('skip');
    var now=new Date().toISOString();
    data.forEach(function(item){
      if(!item.id)item.id=genId();
      if(!item.createdAt)item.createdAt=now;
      item.updatedAt=now;
      if(!item.images)item.images=[];
      if(!item.deliverableImages)item.deliverableImages=[];
    });
    records=data;
    saveLocalRecords();
    renderList(); updateStats();
  }).catch(function(){
    // backup.json加载失败，回退到SEED_DATA
    var now=new Date().toISOString();
    records=SEED_DATA.map(function(item){
      item.id=genId();item.images=item.images||[];item.createdAt=now;item.updatedAt=now;return item;
    });
    saveLocalRecords();
    renderList(); updateStats();
  });
}
function saveRecords(){ saveLocalRecords(); }
function saveLocalRecords(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records))}catch(e){}}
function genId(){return'r_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}

/* ============ TOAST ============ */
function toast(msg,type){
  type=type||'info';
  var m={'success':'toast-success','error':'toast-error','warn':'toast-warn','info':'toast-info'};
  var el=document.createElement('div');el.className='toast '+m[type];el.textContent=msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(function(){el.remove()},3000);
}

/* ============ MODAL ============ */
function showModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

/* ============ PAGE SWITCH ============ */
function switchPage(page,data){
  document.querySelectorAll('.page-section').forEach(function(s){s.classList.remove('active')});
  if(page==='list'){document.getElementById('page-list').classList.add('active');renderList()}
  else if(page==='add'){document.getElementById('page-add').classList.add('active');resetForm();if(data)fillForm(data)}
  else if(page==='detail'){document.getElementById('page-detail').classList.add('active');renderDetail(data)}
}

/* ============ FORM ============ */
function resetForm(){
  document.getElementById('edit-id').value='';
  document.getElementById('form-title').textContent='新增记录';
  document.getElementById('record-form').reset();
  document.getElementById('fld-status').value='未开始';
  editImages=[];renderImagePreviews();
  editDeliverableImages=[];renderDeliverableImagePreviews();
}
function fillForm(rec){
  document.getElementById('edit-id').value=rec.id;
  document.getElementById('form-title').textContent='编辑记录';
  document.getElementById('fld-reporter').value=rec.reporter||'';
  document.getElementById('fld-type').value=rec.problemType||'';
  document.getElementById('fld-responsible').value=rec.responsible||'';
  document.getElementById('fld-assistant').value=rec.assistant||'';
  document.getElementById('fld-planned-date').value=rec.plannedDate||'';
  document.getElementById('fld-status').value=rec.status||'未开始';
  document.getElementById('fld-actual-date').value=rec.actualDate||'';
  document.getElementById('fld-deliverable').value=rec.deliverable||'';
  document.getElementById('fld-desc').value=rec.description||'';
  document.getElementById('fld-solution').value=rec.solution||'';
  document.getElementById('fld-remarks').value=rec.remarks||'';
  editImages=(rec.images||[]).slice();renderImagePreviews();
  editDeliverableImages=(rec.deliverableImages||[]).slice();renderDeliverableImagePreviews();
}
function handleImageUpload(input){
  var files=input.files;if(!files||files.length===0)return;
  var allowed=['image/jpeg','image/png','image/webp'];var processed=0;
  for(var i=0;i<files.length;i++){(function(file){
    if(allowed.indexOf(file.type)===-1){toast('文件 "'+file.name+'" 格式不支持','error');processed++;return}
    if(file.size>5242880){toast('文件 "'+file.name+'" 超过5MB','warn');processed++;return}
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){editImages.push({name:file.name,data:e.target.result,width:img.naturalWidth,height:img.naturalHeight});processed++;if(processed>=files.length)renderImagePreviews()};
      img.src=e.target.result;
    };reader.readAsDataURL(file);
  })(files[i])}input.value='';
}

/* ============ FILTER & LIST ============ */
function getFiltered(){
  var kw=(document.getElementById('f-keyword').value||'').toLowerCase();
  var ptype=document.getElementById('f-type').value;
  var st=document.getElementById('f-status').value;
  var person=(document.getElementById('f-person').value||'').toLowerCase();
  var dateField=document.getElementById('f-date-field').value;
  var datePick=document.getElementById('f-date-pick').value;
  return records.filter(function(r){
    if(kw){var m=false;['reporter','description','problemType','solution','deliverable','responsible','assistant','remarks'].forEach(function(f){if(r[f]&&String(r[f]).toLowerCase().indexOf(kw)>=0)m=true});if(!m)return false}
    if(ptype&&r.problemType!==ptype)return false;
    if(st&&r.status!==st)return false;
    if(person&&(r.responsible||'').toLowerCase().indexOf(person)<0&&(r.reporter||'').toLowerCase().indexOf(person)<0)return false;
    if(dateField&&datePick){
      var dv=dateField==='createdAt'?String(r.createdAt||'').substring(0,10):(r[dateField]||'').replace(/-/g,'');
      if(dateField!=='createdAt'&&/^\d{8}$/.test(dv))dv=dv.substring(0,4)+'-'+dv.substring(4,6)+'-'+dv.substring(6,8);
      if(dv!==datePick)return false;
    }
    return true;
  });
}

  if(!df.value){df.value='plannedDate'}

}

/* ============ 上传到 GitHub ============ */
var GH_OWNER='449227736';
var GH_REPO='-';
var GH_FILE='backup.json';
var GH_TOKEN_KEY='github_pat_tracker';

async function pushToGitHub(){
  var btn=document.getElementById('btn-push-github');
  var token=localStorage.getItem(GH_TOKEN_KEY)||'';
  if(!token.trim()){
    token=await promptToken();
    if(!token) return;
  }

  if(!confirm('确定将当前 '+records.length+' 条记录上传到 GitHub 仓库的 backup.json？\n\n上传后，其他人打开网站会自动加载这些数据。')) return;

  btn.textContent='上传中...'; btn.disabled=true;

  try {
    var apiUrl='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE;
    var authHeader='token '+token.trim();

    // 第一步：获取文件 SHA
    var getResp=await fetch(apiUrl,{
      method:'GET',
      headers:{
        'Authorization':authHeader,
        'Accept':'application/vnd.github.v3+json',
        'User-Agent':'TrackerApp'
      }
    });

    var fileInfo=null;
    if(getResp.ok){
      fileInfo=await getResp.json();
    } else if(getResp.status!==404){
      var ge=await getResp.json().catch(function(){return {}});
      throw new Error(ge.message||'HTTP '+getResp.status);
    }

    // 第二步：上传
    var body={
      message:'更新跟踪表数据 '+new Date().toISOString(),
      content:btoa(unescape(encodeURIComponent(JSON.stringify(records)))),
      branch:'main'
    };
    if(fileInfo&&fileInfo.sha) body.sha=fileInfo.sha;

    var putResp=await fetch(apiUrl,{
      method:'PUT',
      headers:{
        'Authorization':authHeader,
        'Accept':'application/vnd.github.v3+json',
        'Content-Type':'application/json',
        'User-Agent':'TrackerApp'
      },
      body:JSON.stringify(body)
    });

    if(!putResp.ok){
      var pe=await putResp.json().catch(function(){return {}});
      throw new Error(pe.message||'HTTP '+putResp.status);
    }

    toast('数据已成功上传到 GitHub！共 '+records.length+' 条记录','success');
  } catch(err) {
    var msg=err.message||'';
    if(msg.indexOf('401')>-1 || msg.indexOf('Bad credentials')>-1 || msg.indexOf('403')>-1){
      toast('Token 无效或权限不足，请重新输入','error');
      localStorage.removeItem(GH_TOKEN_KEY);
      setTimeout(function(){ pushToGitHub(); },600);
      btn.textContent='上传到 GitHub'; btn.disabled=false;
      return;
    }
    toast('上传失败：'+msg,'error');
  } finally {
    if(btn.textContent==='上传中...'){
      btn.textContent='上传到 GitHub'; btn.disabled=false;
    }
  }
}

function promptToken(){
  return new Promise(function(resolve){
    var t=prompt(
      '请输入 GitHub Personal Access Token（需要 repo 权限）\n\n'+
      '获取步骤：\n'+
      '1. 打开 https://github.com/settings/tokens\n'+
      '2. 点「Generate new token (classic)」\n'+
      '3. 勾选 repo 权限，点最底部 Generate\n'+
      '4. 复制生成的 ghp_ 开头的 Token\n\n'+
      '（Token 会保存在浏览器本地，下次无需重新输入）'
    );
    if(!t||!t.trim()){ resolve(''); return; }
    var v=t.trim();
    localStorage.setItem(GH_TOKEN_KEY,v);
    toast('Token 已保存，下次无需重新输入','success');
    resolve(v);
  });
}

/* ============ 重置为初始数据 ============ */
function restoreBackup(){
  if(!confirm('将从云端备份文件（backup.json）恢复数据。\n\n点"确定" = 替换当前所有数据\n点"取消" = 追加到现有记录'))return;
  var btn=document.getElementById('btn-restore');
  btn.textContent='恢复中...';btn.disabled=true;
  fetch('./backup.json?_t='+Date.now()).then(function(r){
    if(!r.ok)throw new Error('备份文件加载失败（HTTP '+r.status+'）');
    return r.json();
  }).then(function(data){
    if(!Array.isArray(data))throw new Error('备份文件格式错误：需要 JSON 数组');
    var mode=confirm('备份文件中共有 '+data.length+' 条记录。\n\n【第二次确认】\n点"确定" = 替换当前所有数据\n点"取消" = 追加到现有记录');
    var now=new Date().toISOString();
    data.forEach(function(item){
      if(!item.id)item.id=genId();
      if(!item.createdAt)item.createdAt=now;
      item.updatedAt=now;
    });
    if(mode){records=data}else{records=records.concat(data)}
    saveRecords();switchPage('list');
    toast('已从云端备份恢复 '+data.length+' 条记录！','success');
  }).catch(function(err){
    toast('恢复失败：'+err.message,'error');
  }).finally(function(){
    btn.textContent='重置为初始数据';btn.disabled=false;
  });
}

function exportJSON(){

  var blob=new Blob([JSON.stringify(records,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='跟踪表数据备份_'+(new Date().toISOString().slice(0,10))+'.json';a.click();
  URL.revokeObjectURL(a.href);toast('已导出 '+records.length+' 条记录','ok');
}
function importJSON(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!Array.isArray(data))throw new Error('格式错误：需要 JSON 数组');
      var mode=confirm('即将导入 '+data.length+' 条记录。\n\n点"确定" = 替换当前所有数据\n点"取消" = 追加到现有记录');
      var now=new Date().toISOString();
      data.forEach(function(item){if(!item.id)item.id=genId();if(!item.createdAt)item.createdAt=now;item.updatedAt=now});
      if(mode){records=data}else{records=records.concat(data)}
      saveRecords();switchPage('list');
      toast('成功导入 '+data.length+' 条记录！','success');
    }catch(err){toast('导入失败：'+err.message,'error')}
  };
  reader.readAsText(file);
  e.target.value='';
}

}

function b64ToBuffer(b64){
  var binary=atob(b64);var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return bytes.buffer;
}

/* ============ ORIGINAL IMAGE CELL INSERT HELPER ============ */

/* 直接使用原图 buffer 插入 Excel，显示尺寸固定 72×72 方形，不按比例、不压缩 */
async function insertOriginalImageToCell(wb, ws, imageObj, rowNumber, col0){
  /* 提取原始图片数据，按优先级：data > dataUrl > src > url > base64 > preview */
  var raw=imageObj;
  var data='';
  var sourceType='unknown';
  if(typeof raw==='string'){
    data=raw; sourceType='string';
  }else if(raw&&typeof raw==='object'){
    data=raw.originalDataUrl||raw.data||raw.originalUrl||raw.dataUrl||raw.src||raw.url||raw.base64||raw.preview||'';
    if(raw.originalDataUrl) sourceType='originalDataUrl';
    else if(raw.data) sourceType='data';
    else if(raw.originalUrl) sourceType='originalUrl';
    else if(raw.dataUrl) sourceType='dataUrl';
    else if(raw.src) sourceType='src';
    else if(raw.url) sourceType='url';
    else if(raw.base64) sourceType='base64';
    else if(raw.preview) sourceType='preview(LOW-RES!)';
  }
  console.log('[原图插入] row='+rowNumber+' col='+(col0===4?'E':'G')+' sourceType='+sourceType+' dataLen='+(data?data.length:0));
  if(!data||typeof data!=='string'||data.length<20) return false;
  if(data.indexOf('data:image')!==0){
    if(data.indexOf('http')===0){
      console.log('[原图插入] 跳过URL类型图片');
      return false;
    }
    if(/^[A-Za-z0-9+/=]+$/.test(data)&&data.length>100){
      data='data:image/png;base64,'+data;
    }else{
      console.log('[原图插入] 不是有效的图片数据，跳过');
      return false;
    }
  }
  if(sourceType==='preview(LOW-RES!)') console.warn('[原图插入] ⚠️ 当前使用的是预览图/缩略图，可能不清晰');
  try{
    var ext='png';
    if(data.indexOf('data:image/jpeg')===0) ext='jpeg';
    else if(data.indexOf('data:image/png')===0) ext='png';
    else if(data.indexOf('data:image/gif')===0) ext='gif';
    else if(data.indexOf('data:image/webp')===0) ext='png';
    var b64Part=data.split(',')[1];
    if(!b64Part) throw new Error('base64数据为空');
    var buf=b64ToBuffer(b64Part);
    console.log('[原图插入] 原图buffer长度='+buf.length+' ext='+ext+' row='+rowNumber);
    var imgId=wb.addImage({buffer:buf, extension:ext});
    /* 固定 72×72 方形显示，tl+ext 居中，oneCell 不变形 */
    ws.addImage(imgId,{
      tl:{col:col0+0.32, row:rowNumber-1+0.16},
      ext:{width:72, height:72},
      editAs:'oneCell'
    });
    console.log('[原图插入] 成功 row='+rowNumber+' col='+(col0===4?'E':'G')+' bufferLen='+buf.length+' 72x72方形');
    return true;
  }catch(e){
    console.log('[原图插入] 失败 row='+rowNumber+' col='+col0, e.message);
    return false;
  }
}

/* ============ SHARED EXCEL HELPERS ============ */
function fmtDate(v){
  if(!v)return '';
  if(typeof v==='number'){var d=new Date((v-25569)*86400000);return d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)}
  var s=String(v).trim();
  if(/^\d{8}$/.test(s))return s;
  if(/^\d{4}[-/]\d{2}[-/]\d{2}/.test(s))return s.substring(0,10).replace(/[-/]/g,'');
  return s;
}
function parseDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  if(typeof v==='number'){var d=new Date((v-25569)*86400000);return isNaN(d)?null:d}
  var s=String(v).trim().replace(/[\/]/g,'-');
  if(/^\d{8}$/.test(s)) s=s.substring(0,4)+'-'+s.substring(4,6)+'-'+s.substring(6,8);
  var d2=new Date(s);return isNaN(d2)?null:d2;
}
function isOverdue(planDate,status){
  if(status==='已完成')return false;
  var pd=parseDate(planDate);if(!pd)return false;
  var today=new Date();today.setHours(0,0,0,0);
  return pd<today;
}
function isOnTime(planDate,actualDate){
  var pd=parseDate(planDate),ad=parseDate(actualDate);
  if(!pd||!ad)return '无法判断';
  return ad<=pd?'是':'否';
}
function pct(n,total){return total===0?'0%':(Math.round(n/total*1000)/10)+'%'}
function mkBorder(){return{top:{style:'thin',color:{argb:'FF000000'}},left:{style:'thin',color:{argb:'FF000000'}},bottom:{style:'thin',color:{argb:'FF000000'}},right:{style:'thin',color:{argb:'FF000000'}}}}
function mkCenter(){return{vertical:'middle',horizontal:'center',wrapText:true}}
function mkLeft(){return{vertical:'middle',horizontal:'left',wrapText:true}}
var S_HEADER_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FFFF0000'}};
var S_WHITE_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFFFF'}};
var S_GREEN_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FF00B050'}};
var S_RED_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FFFF0000'}};
var S_YELLOW_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFF00'}};
var S_LIGHT_RED_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFC7CE'}};
var S_LIGHT_YELLOW_FILL={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF2CC'}};
var S_BLACK_FONT={name:'Microsoft YaHei',size:11,color:{argb:'FF000000'}};
var S_WHITE_FONT={name:'Microsoft YaHei',size:11,color:{argb:'FFFFFFFF'},bold:true};

function applyCellBase(cell){
  cell.border=mkBorder();cell.alignment=mkCenter();cell.fill=S_WHITE_FILL;cell.font=S_BLACK_FONT;
}
function applyCellHeader(cell){
  cell.border=mkBorder();cell.alignment=mkCenter();cell.fill=S_HEADER_FILL;cell.font=S_HEADER_FONT;
}
function applyStatusColor(cell,status){
  cell.border=mkBorder();cell.alignment=mkCenter();
  if(status==='已完成'){cell.fill=S_GREEN_FILL;cell.font=S_WHITE_FONT;}
  else if(status==='未开始'){cell.fill=S_RED_FILL;cell.font=S_WHITE_FONT;}
  else if(status==='处理中'){cell.fill=S_YELLOW_FILL;cell.font=S_BLACK_FONT;}
  else{cell.fill=S_WHITE_FILL;cell.font=S_BLACK_FONT;}
}
/* 分组统计 */
function calcSummary(data){
  var now=new Date();now.setHours(0,0,0,0);
  var total=data.length,done=0,inprog=0,notstart=0,other=0,overdue=0;
  data.forEach(function(r){
    var s=r.status||'';
    if(s==='已完成')done++;
    else if(s==='处理中')inprog++;
    else if(s==='未开始')notstart++;
    else other++;
    if(isOverdue(r.plannedDate,s))overdue++;
  });
  return{total:total,done:done,inprog:inprog,notstart:notstart,other:other,
    overdue:overdue,undone:inprog+notstart+other,
    doneRate:pct(done,total)};
}
function calcByType(data){
  var map={};
  data.forEach(function(r){
    var t=r.problemType||'（未填写）';
    if(!map[t])map[t]={type:t,total:0,done:0,inprog:0,notstart:0,other:0};
    map[t].total++;
    var s=r.status||'';
    if(s==='已完成')map[t].done++;
    else if(s==='处理中')map[t].inprog++;
    else if(s==='未开始')map[t].notstart++;
    else map[t].other++;
  });
  return Object.values(map).sort(function(a,b){return b.total-a.total});
}
function calcByOwner(data){
  var map={};
  data.forEach(function(r){
    var o=r.responsible||'（未填写）';
    if(!map[o])map[o]={owner:o,total:0,done:0,inprog:0,notstart:0,other:0,overdue:0,types:{}};
    map[o].total++;
    var s=r.status||'';
    if(s==='已完成')map[o].done++;
    else if(s==='处理中')map[o].inprog++;
    else if(s==='未开始')map[o].notstart++;
    else map[o].other++;
    if(isOverdue(r.plannedDate,s))map[o].overdue++;
    var t=r.problemType||'其他';
    map[o].types[t]=(map[o].types[t]||0)+1;
  });
  return Object.values(map).map(function(o){
    o.undone=o.inprog+o.notstart+o.other;
    o.doneRate=pct(o.done,o.total);
    var mt=Object.keys(o.types).sort(function(a,b){return o.types[b]-o.types[a]})[0]||'';
    o.mainType=mt;
    return o;
  }).sort(function(a,b){return b.undone-a.undone||b.total-a.total});
}

/* ============ ANALYSIS EXPORT ============ */
async function doExportAnalysis(data,bar){

    ['完成率',summary.doneRate,'已完成数量 / 问题总数'],
    ['未完成数量',summary.undone,'未开始 + 处理中 + 其他未完成'],

  ];
  s1rows.forEach(function(row,i){
    var rn=3+i;ws1.getRow(rn).height=26;
    row.forEach(function(v,ci){
      var c=ws1.getCell(rn,ci+1);

        c.fill=S_RED_FILL;c.font=S_WHITE_FONT;

  // 按类型汇总
  var typeStart=3+s1rows.length+1;

  addSheetHeaders(ws1,typeStart+1,['问题类型','问题数量','占比']);

    var rn=typeStart+2+i;ws1.getRow(rn).height=24;
    [row.type,row.total,pct(row.total,summary.total)].forEach(function(v,ci){
      var c=ws1.getCell(rn,ci+1);c.value=v;applyCellBase(c);
    });
  });
  // 按责任人汇总
  var ownStart=typeStart+2+byType.length+1;
  ws1.getRow(ownStart).height=30;
  ws1.mergeCells('A'+ownStart+':C'+ownStart);
  var oc=ws1.getCell(ownStart,1);
  oc.value='按责任人统计';oc.fill=S_HEADER_FILL;oc.font=S_HEADER_FONT;
  oc.alignment=mkCenter();oc.border=mkBorder();
  addSheetHeaders(ws1,ownStart+1,['责任人','负责问题数','完成率']);
  byOwner.forEach(function(row,i){
    var rn=ownStart+2+i;ws1.getRow(rn).height=24;
    [row.owner,row.total,row.doneRate].forEach(function(v,ci){
      var c=ws1.getCell(rn,ci+1);c.value=v;applyCellBase(c);
    });
  });
  // 按提出人汇总
  var repMap={};
  data.forEach(function(r){var k=r.reporter||'（未填写）';repMap[k]=(repMap[k]||0)+1;});
  var repArr=Object.keys(repMap).map(function(k){return{name:k,cnt:repMap[k]}}).sort(function(a,b){return b.cnt-a.cnt});
  var repStart=ownStart+2+byOwner.length+1;
  ws1.getRow(repStart).height=30;
  ws1.mergeCells('A'+repStart+':C'+repStart);
  var rc2=ws1.getCell(repStart,1);
  rc2.value='按问题提出人统计';rc2.fill=S_HEADER_FILL;rc2.font=S_HEADER_FONT;
  rc2.alignment=mkCenter();rc2.border=mkBorder();
  addSheetHeaders(ws1,repStart+1,['提出人','提出问题数','占比']);
  repArr.forEach(function(row,i){
    var rn=repStart+2+i;ws1.getRow(rn).height=24;
    [row.name,row.cnt,pct(row.cnt,summary.total)].forEach(function(v,ci){
      var c=ws1.getCell(rn,ci+1);c.value=v;applyCellBase(c);
    });
  });

  /* ─── Sheet 2: 问题类型分析 ─── */
  bar.textContent='正在生成 Sheet2：问题类型分析...';
  var ws2=wb.addWorksheet('问题类型分析');
  ws2.columns=[{width:18},{width:10},{width:10},{width:10},{width:10},{width:12},{width:12},{width:10}];
  addSheetTitle(ws2,'问题类型分析（'+dateStr+'）',8);
  addSheetHeaders(ws2,2,['问题类型','问题数量','已完成','处理中','未开始','其他未完成','完成率','占比']);
  byType.forEach(function(row,i){
    var rn=3+i;ws2.getRow(rn).height=26;
    var vals=[row.type,row.total,row.done,row.inprog,row.notstart,row.other,pct(row.done,row.total),pct(row.total,summary.total)];
    vals.forEach(function(v,ci){
      var c=ws2.getCell(rn,ci+1);c.value=v;applyCellBase(c);
      // 最高类型浅黄突出
      if(i===0){c.fill=S_LIGHT_YELLOW_FILL;}
    });
  });

  /* ─── Sheet 3: 责任人分析 ─── */
  bar.textContent='正在生成 Sheet3：责任人分析...';
  var ws3=wb.addWorksheet('责任人分析');
  ws3.columns=[{width:14},{width:10},{width:10},{width:10},{width:10},{width:12},{width:12},{width:12},{width:10},{width:18}];
  addSheetTitle(ws3,'责任人分析（'+dateStr+'）',10);
  addSheetHeaders(ws3,2,['责任人','负责总数','已完成','处理中','未开始','其他未完成','未完成','超期未完成','完成率','主要问题类型']);
  byOwner.forEach(function(row,i){
    var rn=3+i;ws3.getRow(rn).height=26;
    var vals=[row.owner,row.total,row.done,row.inprog,row.notstart,row.other,row.undone,row.overdue,row.doneRate,row.mainType];
    vals.forEach(function(v,ci){
      var c=ws3.getCell(rn,ci+1);c.value=v;applyCellBase(c);
      // 超期未完成>0红色
      if(ci===7 && row.overdue>0){c.fill=S_RED_FILL;c.font=S_WHITE_FONT;}
    });
  });

  /* ─── Sheet 4: 未完成问题清单 ─── */
  bar.textContent='正在生成 Sheet4：未完成问题清单...';
  var ws4=wb.addWorksheet('未完成问题清单');
  ws4.columns=[{width:6},{width:12},{width:36},{width:14},{width:30},{width:12},{width:12},{width:14},{width:12},{width:20},{width:10}];
  addSheetTitle(ws4,'未完成问题清单（'+dateStr+'）',11);
  addSheetHeaders(ws4,2,['序号','提出人','异常问题描述','问题类型','解决措施','责任人','协助人','计划完成时间','完成情况','备注','是否超期']);
  var undoneList=data.filter(function(r){return r.status!=='已完成'}).map(function(r){
    return Object.assign({},r,{_overdue:isOverdue(r.plannedDate,r.status)});
  }).sort(function(a,b){
    if(a._overdue!==b._overdue)return a._overdue?-1:1;
    var pa=parseDate(a.plannedDate),pb=parseDate(b.plannedDate);
    if(pa&&pb)return pa-pb;return 0;
  });
  undoneList.forEach(function(r,i){
    var rn=3+i;ws4.getRow(rn).height=50;
    var vals=[i+1,r.reporter||'',r.description||'',r.problemType||'',r.solution||'',
      r.responsible||'',r.assistant||'',fmtDate(r.plannedDate),r.status||'',r.remarks||'',r._overdue?'是':'否'];
    vals.forEach(function(v,ci){
      var c=ws4.getCell(rn,ci+1);c.value=v;
      if(r._overdue){c.fill=S_LIGHT_RED_FILL;c.font=S_BLACK_FONT;c.border=mkBorder();c.alignment=mkCenter();}
      else{applyCellBase(c);}
      // 完成情况单元格独立上色
      if(ci===8){applyStatusColor(c,r.status||'');}
      // 是否超期单元格
      if(ci===10 && r._overdue){c.fill=S_RED_FILL;c.font=S_WHITE_FONT;c.border=mkBorder();c.alignment=mkCenter();}
    });
  });

  /* ─── Sheet 5: 已完成问题清单 ─── */
  bar.textContent='正在生成 Sheet5：已完成问题清单...';
  var ws5=wb.addWorksheet('已完成问题清单');
  ws5.columns=[{width:6},{width:12},{width:36},{width:14},{width:30},{width:20},{width:12},{width:14},{width:14},{width:12},{width:20}];
  addSheetTitle(ws5,'已完成问题清单（'+dateStr+'）',11);
  addSheetHeaders(ws5,2,['序号','提出人','异常问题描述','问题类型','解决措施','交付物','责任人','计划完成时间','实际完成时间','是否按期完成','备注']);
  var doneList=data.filter(function(r){return r.status==='已完成'});
  doneList.forEach(function(r,i){
    var rn=3+i;ws5.getRow(rn).height=50;
    var onTime=isOnTime(r.plannedDate,r.actualDate);
    var vals=[i+1,r.reporter||'',r.description||'',r.problemType||'',r.solution||'',
      r.deliverable||'',r.responsible||'',fmtDate(r.plannedDate),fmtDate(r.actualDate),onTime,r.remarks||''];
    vals.forEach(function(v,ci){
      var c=ws5.getCell(rn,ci+1);c.value=v;applyCellBase(c);
      if(ci===9 && onTime==='否'){c.fill=S_LIGHT_RED_FILL;c.font=S_BLACK_FONT;c.border=mkBorder();}
    });
  });

  /* ─── Sheet 6: 典型问题复盘 ─── */
  bar.textContent='正在生成 Sheet6：典型问题复盘...';
  var ws6=wb.addWorksheet('典型问题复盘');
  ws6.columns=[{width:6},{width:36},{width:14},{width:12},{width:12},{width:14},{width:14},{width:30},{width:20},{width:20},{width:12},{width:14}];
  addSheetTitle(ws6,'典型问题复盘（'+dateStr+'）',12);
  addSheetHeaders(ws6,2,['序号','问题描述','问题类型','当前状态','责任人','计划完成时间','实际完成时间','当前卡点/备注','复盘结论','后续动作','行动责任人','截止时间']);
  var riskKw=['风险','卡点','等待','影响','异常','反复','未解决','缺料','返工','投诉','延误'];
  var typicalList=data.filter(function(r){
    if(isOverdue(r.plannedDate,r.status))return true;
    var note=(r.remarks||'')+(r.description||'');
    if(riskKw.some(function(kw){return note.indexOf(kw)>-1}))return true;
    return false;
  });
  // 去重（已经被超期条件覆盖的不再被备注关键词重复添加）
  var typicalIds={};
  typicalList=typicalList.filter(function(r){
    if(typicalIds[r.id])return false;typicalIds[r.id]=true;return true;
  });
  typicalList.sort(function(a,b){
    var ao=isOverdue(a.plannedDate,a.status),bo=isOverdue(b.plannedDate,b.status);
    if(ao!==bo)return ao?-1:1;return 0;
  });
  typicalList.forEach(function(r,i){
    var rn=3+i;ws6.getRow(rn).height=60;
    var overdue=isOverdue(r.plannedDate,r.status);
    var vals=[i+1,r.description||'',r.problemType||'',r.status||'',r.responsible||'',
      fmtDate(r.plannedDate),fmtDate(r.actualDate),r.remarks||'','','','',''];
    vals.forEach(function(v,ci){
      var c=ws6.getCell(rn,ci+1);c.value=v;
      if(overdue){c.fill=S_LIGHT_RED_FILL;c.font=S_BLACK_FONT;c.border=mkBorder();c.alignment=mkCenter();}
      else{applyCellBase(c);}
      if(ci===3){applyStatusColor(c,r.status||'');}
    });
  });

  /* ─── Sheet 7: 复盘会议纪要 ─── */
  bar.textContent='正在生成 Sheet7：复盘会议纪要...';
  var ws7=wb.addWorksheet('复盘会议纪要');
  ws7.columns=[{width:8},{width:36},{width:14},{width:12},{width:14},{width:20},{width:10},{width:20}];
  addSheetTitle(ws7,'套管交付与质量专项改善复盘会议纪要',8);
  // 基本信息区
  var infoRows=[
    ['会议主题','套管交付与质量专项改善复盘会'],
    ['会议时间',''],['会议地点',''],['参会人员',''],['主持人',''],['记录人','']
  ];
  infoRows.forEach(function(row,i){
    var rn=2+i;ws7.getRow(rn).height=30;
    ws7.mergeCells('B'+rn+':H'+rn);
    var c1=ws7.getCell(rn,1),c2=ws7.getCell(rn,2);
    c1.value=row[0];c1.font=Object.assign({},S_BLACK_FONT,{bold:true});c1.border=mkBorder();c1.alignment=mkCenter();c1.fill=S_LIGHT_YELLOW_FILL;
    c2.value=row[1];c2.font=S_BLACK_FONT;c2.border=mkBorder();c2.alignment=mkLeft();
  });
  // 讨论区块
  var blocks=['本期问题整体情况','主要异常问题','原因分析','改善措施','未关闭事项','需要协调资源','下次跟进时间'];
  var blockStart=8;
  blocks.forEach(function(title,i){
    var rn=blockStart+i*3;
    ws7.getRow(rn).height=28;
    ws7.mergeCells('A'+rn+':H'+rn);
    var ct=ws7.getCell(rn,1);
    ct.value=(i+1)+'. '+title;ct.fill=S_LIGHT_YELLOW_FILL;
    ct.font=Object.assign({},S_BLACK_FONT,{bold:true});ct.border=mkBorder();ct.alignment=mkLeft();
    for(var rb=rn+1;rb<=rn+2;rb++){
      ws7.getRow(rb).height=30;
      ws7.mergeCells('A'+rb+':H'+rb);
      var cb=ws7.getCell(rb,1);
      cb.value='';cb.fill=S_WHITE_FILL;cb.font=S_BLACK_FONT;cb.border=mkBorder();cb.alignment=mkLeft();
    }
  });
  // 行动项表格
  var actionStart=blockStart+blocks.length*3+1;
  ws7.getRow(actionStart).height=30;
  ws7.mergeCells('A'+actionStart+':H'+actionStart);
  var actTitle=ws7.getCell(actionStart,1);
  actTitle.value='行动项跟踪';actTitle.fill=S_HEADER_FILL;actTitle.font=S_HEADER_FONT;
  actTitle.alignment=mkCenter();actTitle.border=mkBorder();
  addSheetHeaders(ws7,actionStart+1,['序号','行动项','责任人','协助人','截止时间','输出物','状态','备注']);
  for(var ak=0;ak<8;ak++){
    var arn=actionStart+2+ak;
    ws7.getRow(arn).height=30;
    for(var aCol=1;aCol<=8;aCol++){
      var ac=ws7.getCell(arn,aCol);
      ac.value='';applyCellBase(ac);
    }
    ws7.getCell(arn,1).value=ak+1;
  }

  /* ─── 下载 ─── */
  bar.textContent='正在生成下载文件...';
  await downloadWb(wb,'套管交付与质量专项改善复盘分析资料_'+dateStr+'.xlsx');
  hideBar(bar,'导出成功！',false);
  toast('复盘分析资料导出成功！共 '+data.length+' 条数据，7个 Sheet','success');
}

/* ============ HELPERS ============ */
function updateStats(){
  document.getElementById('stat-total').textContent=records.length;
  document.getElementById('stat-done').textContent=records.filter(function(r){return r.status==='已完成'}).length;
  document.getElementById('stat-progress').textContent=records.filter(function(r){return r.status==='处理中'}).length;
  document.getElementById('stat-pending').textContent=records.filter(function(r){return r.status==='未开始'}).length;
  document.getElementById('stat-delay').textContent=records.filter(function(r){return r.status==='延期'}).length;
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escShort(s,l){s=esc(s);l=l||30;return s.length>l?s.substring(0,l)+'...':s}

/* ============ INIT ============ */
function init(){loadRecords();renderList()}
document.getElementById('delete-modal').addEventListener('click',function(e){if(e.target===this)closeModal('delete-modal')});
init();
</script>
</body>
